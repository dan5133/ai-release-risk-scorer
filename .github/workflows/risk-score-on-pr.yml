name: AI Release Risk Assessment

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  risk-assessment:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run risk assessment on sample results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run score sample-results/sample-playwright-output.json
        continue-on-error: true

      - name: Upload risk report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: risk-assessment-report
          path: reports/
          retention-days: 30
